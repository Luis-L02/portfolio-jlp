<div class="animate-fade-in animate-slide-up">
  <!-- Horizontal Scrolling Container -->
  <div class="flex overflow-x-auto pb-8 -mx-6 px-6 space-x-6 snap-x snap-mandatory hide-scrollbar">
    
    @for (project of dataService.projects(); track project.titleKey) {
      <div class="min-w-[85vw] md:min-w-[340px] max-w-[340px] snap-center shrink-0">
        <!-- Interactive Card -->
        <div class="group h-full bg-bg-secondary/40 backdrop-blur-sm border border-border-muted rounded-2xl overflow-hidden hover:border-accent-primary/50 transition-all duration-500 hover:shadow-2xl hover:shadow-accent-primary/10 flex flex-col">
          


          <!-- Content Section -->
          <div class="p-6 flex-1 flex flex-col">
            <h3 class="text-xl font-bold text-text-title mb-1 group-hover:text-accent-primary transition-colors">
              {{ project.titleKey | translate }}
            </h3>
            
            <p class="text-xs font-medium text-accent-primary mb-4 uppercase tracking-wider">
              {{ project.subtitleKey | translate }}
            </p>
            
            <p class="text-sm text-text-muted leading-relaxed flex-1 mb-6">
              {{ project.descKey | translate }}
            </p>

            <div class="pt-2">
              <!-- Standard HTML Button -->
              <a [href]="project.demoUrl" target="_blank"
                class="w-full text-xs font-semibold py-2.5 px-4 rounded-lg border border-accent-primary text-text-title hover:bg-accent-primary transition-all duration-300 ease-out cursor-pointer flex items-center justify-center space-x-1.5 focus:outline-none">
                <span>{{ 'PROJECTS.DEMO_BUTTON' | translate }}</span>
                <i class="pi pi-arrow-up-right text-[10px]"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    }

  </div>
  
  <!-- Swipe Indicator (Mobile only) -->
  <div class="flex justify-center mt-2 md:hidden">
    <div class="flex items-center space-x-2 text-text-muted/50 text-xs">
      <i class="pi pi-arrow-left"></i>
      <span>{{ 'PROJECTS.SWIPE_HINT' | translate }}</span>
      <i class="pi pi-arrow-right"></i>
    </div>
  </div>
</div>
